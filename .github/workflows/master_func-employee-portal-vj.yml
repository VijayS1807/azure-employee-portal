name: Build and deploy Azure Functions

on:
  push:
    branches:
      - master
    paths:
      - 'api/EmployeePortal.Functions/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build and publish Functions
        run: dotnet publish api/EmployeePortal.Functions/EmployeePortal.Functions.csproj
          --configuration Release
          --output ./publish/functions

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: functions-app
          path: ./publish/functions

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write   # required for OIDC login
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: functions-app
          path: ./publish/functions

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FUNCTIONS }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FUNCTIONS }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FUNCTIONS }}

      # TODO: replace 'func-employee-portal-vj' with your actual Function App name
      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: 'func-employee-portal-vj'
          package: ./publish/functions
